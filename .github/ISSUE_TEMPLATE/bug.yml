name: Bug report
description: Report a reproducible defect without private data
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Use synthetic values only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Remove tokens, tenant data, personal IDs, and business content.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials and private identifiers.
          required: true
