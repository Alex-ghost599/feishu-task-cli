name: CodeQL

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    - cron: "17 3 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: codeql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9
        with:
          languages: python
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
