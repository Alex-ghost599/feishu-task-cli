name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: validate-build-release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Verify annotated tag and main target
        shell: bash
        run: bash scripts/verify_release_tag.sh
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.9.11"
      - name: Verify lock before project execution
        run: |
          uv lock --check
      - name: Verify package version without project execution
        shell: bash
        run: |
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          ACTUAL_VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          test "$ACTUAL_VERSION" = "$EXPECTED_VERSION"
      - name: Sync locked test environment
        run: uv sync --locked --extra test
      - name: Run full release gate
        run: |
          uv run --locked ruff format --check .
          uv run --locked ruff check .
          uv run --locked mypy src scripts
          uv run --locked pytest -v --cov=feishu_task_cli --cov-fail-under=90
          uv run --locked pip-audit
          uv run --locked python scripts/privacy_scan.py --history
      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
      - name: Build and validate distributions
        shell: bash
        run: |
          uv build --clear --out-dir release/packages
          uv run --locked twine check release/packages/*.whl release/packages/*.tar.gz
          SMOKE_ENV="${RUNNER_TEMP}/release-smoke"
          uv venv "$SMOKE_ENV"
          uv pip install --python "$SMOKE_ENV/bin/python" release/packages/*.whl
          "$SMOKE_ENV/bin/feishu-task" --help
          test "$("$SMOKE_ENV/bin/python" -c 'import feishu_task_cli; print(feishu_task_cli.__version__)')" = "${GITHUB_REF_NAME#v}"
          (cd release/packages && sha256sum *.whl *.tar.gz > ../SHA256SUMS && sha256sum -c ../SHA256SUMS)
      - name: Upload validated distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-distributions
          path: release/
          if-no-files-found: error
          retention-days: 7
      - name: Attest validated distributions
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: |
            release/packages/*.whl
            release/packages/*.tar.gz
            release/SHA256SUMS
      - name: Create GitHub Release from validated distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          release/packages/* release/SHA256SUMS
          --verify-tag --generate-notes

  publish-pypi:
    name: publish-pypi-if-explicitly-enabled
    if: ${{ vars.PYPI_TRUSTED_PUBLISHING == 'true' }}
    needs: release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download validated distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-distributions
          path: release
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          version: "0.9.11"
      - name: Revalidate downloaded bytes and metadata
        run: |
          cd release/packages
          sha256sum -c ../SHA256SUMS
          uvx --from twine==6.2.0 twine check *.whl *.tar.gz
      - name: Publish the validated package bytes with trusted publishing
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: release/packages
